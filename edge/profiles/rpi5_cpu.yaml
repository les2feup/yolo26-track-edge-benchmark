# Raspberry Pi 5 — CPU-only (no Hailo hat, or hat not available)
# Cortex-A76 quad-core @ 2.4 GHz, 8 GB LPDDR4X
# Baseline for RPi5 without AI acceleration

device_id: rpi5_cpu
device_label: "Raspberry Pi 5 Model B (CPU)"
os: raspbian

torch_device: cpu
backend: ncnn

model_variants:
  - yolo26n_640_ncnn_model
  - yolo26n_576_ncnn_model
  - yolo26s_640_ncnn_model
  - yolo26s_576_ncnn_model
  - yolo26m_640_ncnn_model
  - yolo26m_576_ncnn_model 

model_format: ncnn_model

resolutions: [640, 576]

warmup_frames: 30
result_tag: rpi5_cpu

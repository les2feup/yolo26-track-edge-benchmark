# NVIDIA Jetson Nano — Seeed Studio reComputer J10
# Maxwell GPU (128 CUDA cores, sm_53), 4 GB LPDDR4 shared CPU/GPU memory
# JetPack 4.6.x: CUDA 10.2, cuDNN 8.0, TensorRT 8.2, Python 3.8 (via apt)
#
# TensorRT FP16 via .engine files compiled on-device (edge/export_tensorrt.py).
# The system tensorrt.so (Python 3.6) is bypassed by the ultralytics-hosted
# tensorrt-8.2.0.6 wheel for Python 3.8 (see JetsonNano_SETUP.md Step 8b).
#
# Environment setup: see edge/JetsonNano_SETUP.md

device_id: jetson_nano
device_label: "Jetson Nano (Seeed reComputer J10, JetPack 4.6.x)"
os: jetpack

torch_device: "cuda:0"
backend: tensorrt

# .engine files compiled on-device via edge/export_tensorrt.py.
# TensorRT FP16 on Maxwell GPU — fixed input shape per engine file.
# Resolution encoded in filename: no suffix = 640px, _576 = 576px.
model_variants:
  # 640px engines
  - yolo26n.engine
  - yolo26s.engine
  - yolo26m.engine      # may OOM during export (4 GB shared memory)
  - yolo26l.engine      # likely OOM — attempted for completeness
  - yolo26x.engine      # likely OOM — attempted for completeness
  # 576px engines
  - yolo26n_576.engine
  - yolo26s_576.engine
  - yolo26m_576.engine
  - yolo26l_576.engine
  - yolo26x_576.engine

model_format: engine

resolutions: [640, 576]

warmup_frames: 30
result_tag: jetson_nano

# NVIDIA Jetson Nano — Seeed Studio reComputer J10
# Maxwell GPU (128 CUDA cores, sm_53), 4 GB LPDDR4 shared CPU/GPU memory
# JetPack 4.6.x: CUDA 10.2, cuDNN 8.0, TensorRT 8.2, Python 3.8 (via apt)
#
# PyTorch CUDA FP32 via .pt weights — same precision as the desktop baseline.
# TensorRT engines (both FP16 and FP32) produce incorrect detection counts on
# TensorRT 8.2 / Maxwell (sm_53) — verified experimentally (2 det vs 6 expected).
# See JetsonNano_SETUP.md Known Issues for details.
#
# Environment setup: see edge/JetsonNano_SETUP.md

device_id: jetson_nano
device_label: "Jetson Nano (Seeed reComputer J10, JetPack 4.6.x)"
os: jetpack

torch_device: "cuda:0"
backend: cuda

# .pt weights loaded via ultralytics YOLO() → PyTorch CUDA on Maxwell GPU.
# FP32 precision — dynamic input shapes, same .pt file runs at any resolution.
model_variants:
  - yolo26n.pt
  - yolo26s.pt
  - yolo26m.pt      # may OOM at runtime (4 GB shared memory)
  - yolo26l.pt      # likely OOM — attempted for completeness
  - yolo26x.pt      # likely OOM — attempted for completeness

model_format: pt

resolutions: [640, 576]

warmup_frames: 30
result_tag: jetson_nano

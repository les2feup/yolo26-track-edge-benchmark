# Raspberry Pi 5 + Hailo-8L M.2 AI Hat
# Backend: Hailo-8L (13 TOPS) via HailoRT + hailort Python bindings
# HEF models must be compiled offline on Ubuntu 22.04 / Python 3.10 / DFC v3.32
# See: edge/export_hailo.py for the export pipeline

device_id: rpi5_hailo
device_label: "Raspberry Pi 5 Model B + Hailo-8L"
os: raspbian

# Torch device for the pre/post-processing path (CPU on all RPi variants)
torch_device: cpu

# Backend selects the inference executor in runner.py
# Options: cpu | cuda | tensorrt | hailo
backend: hailo

# .hef files must be placed in models/ alongside the .pt originals
# Compilation: edge/export_hailo.py --model yolo26n.pt --hw-arch hailo8l
model_variants:
  # Default (hailo8l @ 640px)
  - yolo26n_hq.hef
  - yolo26s_hq.hef
  - yolo26m_hq.hef      
  # - yolo26l_hq.hef      
  # - yolo26x_hq.hef      
  # 576px variants
  - yolo26n_576_hq.hef
  - yolo26s_576_hq.hef
  - yolo26m_576_hq.hef
  # - yolo26l_576_hq.hef
  # - yolo26x_576_hq.hef

model_format: hef

# HEF resolution is fixed at compile time — each HEF variant runs at one resolution only.
# The runner passes imgsz to the loop but hailo_runner.py reads the actual shape from
# the HEF itself (hef_imgsz). resolutions: [640, 576] here prevents redundant loop iterations.
resolutions: [640, 576]

warmup_frames: 30

# Tag appended to all output CSV filenames for result provenance
result_tag: rpi5_hailo
